# Coverage config for the package-aggregate gate (`scripts/coverage-gate`).
# `bun test --coverage` (run from this dir) emits lcov scoped to this package's
# own `src/` — the `../**` ignore keeps sibling packages out of the report.
# Preloads the shared setup (happy-dom + preserved native Request/AbortSignal)
# so the suite behaves the same as the root `bun test`.
[test]
preload = ["../../test/setup.ts"]
coverageReporter = ["lcov"]
coverageDir = "coverage"
coveragePathIgnorePatterns = ["../**"]
