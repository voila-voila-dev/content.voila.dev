name: playground.content.voila.dev — Deploy

on:
  push:
    branches:
      - main
    paths:
      - "products/content.voila.dev/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/playground.content.voila.dev-deploy.yml"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bun
      - uses: ./.github/actions/install

      # TanStack Start's worker entry (`@tanstack/react-start/server-entry` in
      # wrangler.jsonc) is a virtual module emitted by the Vite build, so
      # wrangler can only deploy once `vite build` has run. Mirrors the app's
      # `deploy` script (`bun run build && wrangler deploy`).
      - name: Build
        working-directory: products/content.voila.dev/apps/playground.content.voila.dev
        run: bun run build

      - name: Deploy to Cloudflare Workers (production)
        uses: ./.github/actions/cloudflare-workers-publish
        with:
          working-directory: products/content.voila.dev/apps/playground.content.voila.dev
          command: deploy
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
