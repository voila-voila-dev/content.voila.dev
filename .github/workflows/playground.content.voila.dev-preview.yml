name: playground.content.voila.dev — Preview

on:
  pull_request:
    paths:
      - "products/content.voila.dev/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/playground.content.voila.dev-preview.yml"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build & upload preview version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-bun
      - uses: ./.github/actions/install

      # TanStack Start's worker entry (`@tanstack/react-start/server-entry` in
      # wrangler.jsonc) is a virtual module emitted by the Vite build, so
      # wrangler can only upload once `vite build` has run.
      - name: Build
        working-directory: products/content.voila.dev/apps/playground.content.voila.dev
        run: bun run build

      - name: Upload preview version to Cloudflare Workers
        id: deploy
        uses: ./.github/actions/cloudflare-workers-publish
        with:
          working-directory: products/content.voila.dev/apps/playground.content.voila.dev
          # `--preview-alias` mints a stable per-PR Preview URL
          # (pr-<n>-voila-playground.<subdomain>.workers.dev) and makes wrangler
          # print it, so the action can surface it in the PR comment below.
          # NB: the action runs `wrangler $WRANGLER_COMMAND` unquoted, so the
          # alias must not be quoted here (quotes would land in the value, which
          # the API rejects). `pr-<n>` has no spaces, so bare is safe.
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number || github.run_id }} --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/sticky-pr-comment
        with:
          id: playground-content-voila-dev-preview
          body: |
            🧪 **Playground preview** — `playground.content.voila.dev`

            - Preview: ${{ steps.deploy.outputs.deployment-url }}
            - Commit: `${{ github.event.pull_request.head.sha }}`
