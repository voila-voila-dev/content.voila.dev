name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: bun test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: voila-voila-dev/.github/actions/setup-bun@main
      - uses: voila-voila-dev/.github/actions/install@main

      - name: bun run check
        shell: bash
        run: bun run check

      - name: Coverage gates (schema ≥ 90%, content ≥ 70%)
        shell: bash
        run: bun run test:cov:gates
