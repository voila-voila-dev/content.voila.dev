name: 'Sticky PR Comment'
description: 'Create or update an id-identified comment on the current pull request'
inputs:
  id:
    description: 'Unique id for the comment; wrapped into an HTML marker to find and update an existing comment'
    required: true
  body:
    description: 'Markdown body of the comment (marker will be prepended automatically)'
    required: true
  github-token:
    description: 'GitHub token with pull-requests: write permission'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - name: Upsert sticky comment
      uses: actions/github-script@v7
      env:
        STICKY_ID: ${{ inputs.id }}
        STICKY_BODY: ${{ inputs.body }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const id = process.env.STICKY_ID;
          const rawBody = process.env.STICKY_BODY;
          const marker = `<!-- sticky-pr-comment:${id} -->`;
          const body = `${marker}\n${rawBody}`;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          if (!issue_number) {
            core.setFailed('sticky-pr-comment must run in a pull_request context');
            return;
          }
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
