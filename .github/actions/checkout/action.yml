name: Checkout
description: Check out the repository with full git history (required by changesets).

inputs:
  fetch-depth:
    description: Number of commits to fetch. 0 = full history.
    required: false
    default: "0"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
