pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bunx tsc -b

commit-msg:
  jobs:
    - name: conventional-commits
      run: |
        head -n1 "{1}" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .{1,}' \
          || (echo "" \
              && echo "  Commit message must follow Conventional Commits:" \
              && echo "    <type>(<scope>)?!?: <subject>" \
              && echo "" \
              && echo "  type: feat | fix | docs | style | refactor | perf | test | build | ci | chore | revert" \
              && echo "" \
              && echo "  Examples:" \
              && echo "    feat(schema): add date field constructor" \
              && echo "    fix(db): handle nullable D1 columns" \
              && echo "    chore!: drop Node 18 support" \
              && echo "" \
              && exit 1)
